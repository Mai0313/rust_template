name: Release Drafter

on:
  push:
    # branches to consider in the event; optional, defaults to all
    branches:
      - main
      - master

permissions: write-all

jobs:
  update_release_draft:
    name: Update Release Draft
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog
        id: git-cliff
        uses: orhun/git-cliff-action@v4.7.1
        with:
          config: ./.github/cliff.toml
          args: --bump --unreleased

      - name: Upsert draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.git-cliff.outputs.version }}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q '^true$'; then
            gh release edit "${{ steps.git-cliff.outputs.version }}" --draft=true --notes-file "${{ steps.git-cliff.outputs.changelog }}"
          else
            gh release create "${{ steps.git-cliff.outputs.version }}" --draft --title "${{ steps.git-cliff.outputs.version }}" --notes-file "${{ steps.git-cliff.outputs.changelog }}"
          fi
