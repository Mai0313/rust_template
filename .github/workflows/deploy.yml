name: Publish GitHub Pages

on:
  push:
    branches:
      - main
      - master
    tags:
      - v*

permissions: write-all

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Disable SSL Verify
        run: git config --global http.sslVerify false

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.0
        with:
          cache-key: docs

      - name: Build docs
        run: |
          cargo doc --no-deps --all-features --locked

      - name: Create redirect index.html
        run: |
          echo '<meta http-equiv="refresh" content="0; url=vibe_coding_tracker/index.html">' > target/doc/index.html

      - name: Remove cargo lock artifact
        run: rm -f target/doc/.lock

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./target/doc

      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
